<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Incident Dashboard | SafeTrack HSE Portal</title>
  <meta name="description" content="View submitted workplace incident reports stored in the SafeTrack HSE Portal dashboard.">
  <meta name="author" content="Chibueze Igbokwe">

  <meta property="og:title" content="SafeTrack Incident Dashboard">
  <meta property="og:description" content="Review locally saved incident reports and view report details in the SafeTrack HSE Portal.">
  <meta property="og:image" content="https://chibueze-igbokwe.github.io/wdd231/final/images/logo.svg">
  <meta property="og:url" content="https://chibueze-igbokwe.github.io/wdd231/final/dashboard.html">

  <link rel="icon" href="images/logo.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles/normalize.css">
  <link rel="stylesheet" href="styles/small.css">
  <link rel="stylesheet" href="styles/larger.css">

  <script src="scripts/navigation.js" defer></script>
  <script src="scripts/dates.js" defer></script>
  <script src="scripts/dashboard.js" defer></script>
</head>

<body>
  <header>
    <div class="brand">
      <img src="images/logo.svg" alt="SafeTrack HSE Portal logo" width="56" height="56">
      <span>SafeTrack HSE Portal</span>
    </div>

    <button id="menu" aria-label="Open navigation menu"></button>
  </header>

  <nav id="nav-menu">
    <a href="index.html">Home</a>
    <a href="resources.html">Resources</a>
    <a href="report.html">Report Incident</a>
    <a href="dashboard.html" class="active">Dashboard</a>
  </nav>

  <main>
    <h1>Incident Dashboard</h1>

    <section class="dashboard-summary">
      <h2>Saved Incident Reports</h2>
      <p>
        This dashboard displays incident reports saved in this browser using localStorage.
      </p>
      <p><strong>Total Reports:</strong> <span id="report-count">0</span></p>
      <button type="button" id="clear-reports">Clear Reports</button>
    </section>

    <section id="incident-list" class="incident-grid" aria-label="Saved incident reports"></section>

    <dialog id="incident-modal">
      <div id="incident-modal-content"></div>
      <button type="button" id="close-incident-modal">Close</button>
    </dialog>
  </main>

  <footer>
    <div>
      <p>&copy; <span id="currentyear"></span> SafeTrack HSE Portal</p>
      <p>Chibueze Igbokwe | WDD 231</p>
    </div>

    <div>
      <p><a href="attributions.html">Attributions</a></p>
      <p><a href="#">Video Demonstration</a></p>
      <p id="lastModified"></p>
    </div>
  </footer>
</body>
</html>
